server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: datafactory-backend-gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1
        prefer-ip-address: true
    gateway:
      routes:
        - id: auth-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/auth/**
        - id: datasource-db-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/datasource/db/**, /datasource/db
        - id: datasource-db-version-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/datasource/db-version/**, /datasource/db-version
        - id: external-api-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/external-api/**, /external-api
        - id: external-api-version-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/external-api-version/**, /external-api-version
        - id: open-api-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/open-api/**, /open-api
        - id: script-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/script/**, /script
        - id: dashboard-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/dashboard/**
        - id: component-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/component/**, /component
        - id: user-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/users/**, /users
        - id: role-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/roles/**, /roles
        - id: config-health-service
          uri: lb://datafactory-backend-configuration
          predicates:
            - Path=/configuration/**
        - id: task-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/tasks/**, /tasks
        - id: task-dsl-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/task-dsl/**, /task-dsl
        - id: task-test-config-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/task-test-config/**, /task-test-config
        - id: schedule-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/schedule/**
        - id: statistics-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/statistics/**
        - id: node-value-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/task/**
        - id: component-snapshot-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/component-snapshot/**
        - id: executor-health-service
          uri: lb://datafactory-backend-executor-server
          predicates:
            - Path=/executor/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://10.*:*,http://172.*:*,http://192.168.*:*}"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "Authorization,Content-Type,X-Trace-Id"
            allowCredentials: true
            maxAge: 3600

jwt:
  secret: ${JWT_SECRET:datafactory-test-jwt-secret-key-2026-min-32}

security:
  internal-auth-key: ${INTERNAL_AUTH_KEY:test-internal-auth-key-2026}

logging:
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%-5level","logger":"%logger{36}","traceId":"%X{traceId}","msg":"%msg"}%n'

management:
  endpoints:
    web:
      exposure:
        include: "*"
