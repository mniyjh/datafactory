syntax = "proto3";

package executor;

option java_package = "com.cqie.datafactory.executor.grpc.proto";
option java_multiple_files = true;

service PythonExecutor {
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message ExecuteRequest {
  string script_content = 1;
  string script_type = 2;
  map<string, string> input_params = 3;
  int32 timeout_seconds = 4;
  string work_dir = 5;
  map<string, string> env_vars = 6;
  string class_name = 7;
  string method_name = 8;
}

message ExecuteResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  string result_json = 4;
  int32 duration_ms = 5;
  string error_message = 6;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string python_version = 2;
  string message = 3;
}
