server:
  port: 8082

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: datafactory-backend-executor-server
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/datafactory?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000
      cachePrepStmts: true
      prepStmtCacheSize: 250
      prepStmtCacheSqlLimit: 2048
      leak-detection-threshold: 2000
  mail:
    host: smtp.qq.com
    port: 465
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1
        prefer-ip-address: true
      config:
        enabled: true
        import-check:
          enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.cqie.datafactory.executor.mapper: warn
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%-5level","logger":"%logger{36}","traceId":"%X{traceId}","msg":"%msg"}%n'

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

grpc:
  python:
    host: ${GRPC_PYTHON_HOST:127.0.0.1}
    port: ${GRPC_PYTHON_PORT:50051}

datafactory:
  executor:
    instance-id: ${EXECUTOR_INSTANCE_ID:exec-${server.port}}
  scheduler:
    high-frequency:
      enabled: true
      thread-pool-size: 4
      min-interval-seconds: 60
    log-cleanup:
      cron: "0 0 * * * ?"
      retention-days: 7

security:
  internal-auth-key: ${INTERNAL_AUTH_KEY:}
  datasource:
    secret-key: ${DATASOURCE_ENCRYPT_KEY}

jwt:
  secret: ${JWT_SECRET}
