server:
  port: 8082

spring:
  application:
    name: datafactory-backend-executor-server
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/datafactory?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1
        prefer-ip-address: true
      config:
        enabled: true
        import-check:
          enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.cqie.datafactory.executor.mapper: debug

management:
  endpoints:
    web:
      exposure:
        include: "*"

grpc:
  python:
    host: ${GRPC_PYTHON_HOST:127.0.0.1}
    port: ${GRPC_PYTHON_PORT:50051}

datafactory:
  scheduler:
    high-frequency:
      enabled: true
      thread-pool-size: 4
      min-interval-seconds: 60
    log-cleanup:
      cron: "0 0 * * * ?"
      retention-days: 7

security:
  datasource:
    secret-key: ${DATASOURCE_ENCRYPT_KEY:RGF0YUZhY3RvcnlERU1PS2V5MjAyNiEhMTIzNDU2Nzg=}
