server:
  port: 8081

spring:
  application:
    name: datafactory-backend-configuration
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/datafactory?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1
        prefer-ip-address: true
      config:
        enabled: true
        import-check:
          enabled: false

executor:
  base-url: http://127.0.0.1:8082

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{traceId}] %-5level %logger{36} - %msg%n"

security:
  internal-auth-key: ${INTERNAL_AUTH_KEY:}
  datasource:
    secret-key: ${DATASOURCE_ENCRYPT_KEY}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400
  refresh-token-expiration: 604800

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
