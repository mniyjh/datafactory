version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: datafactory-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: datafactory
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./datafactory.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: datafactory-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"

volumes:
  mysql-data:
